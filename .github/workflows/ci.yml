name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pytest>=8.2,<9"

      - name: Validate clean baseline config
        run: |
          python src/analysis/validate_config.py configs/bom_baseline_shadow_vault.json

      - name: Validate baseline-plus-cleanup config
        run: |
          python src/analysis/validate_config.py configs/bom_baseline_plus_cleanup_shadow_vault.json

      - name: Validate extreme config
        run: |
          python src/analysis/validate_config.py configs/bom_extreme_shadow_vault.json

      - name: Run unit tests
        run: |
          pytest

      - name: Smoke-test areal density summary
        run: |
          python src/analysis/areal_density_budget.py configs/bom_baseline_shadow_vault.json --output /tmp/baseline_summary.json
          test -s /tmp/baseline_summary.json

      - name: Smoke-test human-readable zone report
        run: |
          python src/analysis/zone_report.py configs/bom_baseline_shadow_vault.json --output /tmp/baseline_report.txt
          test -s /tmp/baseline_report.txt
